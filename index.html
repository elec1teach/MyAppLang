<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Pronunciation Test Station</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#eef3f8,#dfe9f3);
}

.container{
  max-width:950px;
  margin:auto;
  background:white;
  border-radius:25px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.header{
  text-align:center;
  margin-bottom:25px;
}

h1{
  margin:0;
  color:#d62828;
  font-size:42px;
}

.subtitle{
  margin-top:10px;
  color:#555;
  font-size:22px;
}

.teacher-box{
  margin-top:18px;
  background:#f7f9fc;
  border-left:8px solid #0077ff;
  padding:15px;
  border-radius:15px;
  font-size:20px;
  line-height:1.8;
  color:#333;
}

.teacher-title{
  font-weight:bold;
  color:#0056b3;
  font-size:22px;
}

.login-box{
  margin-bottom:25px;
  text-align:center;
}

.login-box input{
  width:80%;
  padding:16px;
  font-size:20px;
  border-radius:12px;
  border:1px solid #ccc;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.stat{
  background:#f3f6fa;
  padding:12px 20px;
  border-radius:15px;
  font-size:20px;
  font-weight:bold;
}

.sentence-box{
  background:#fff7d6;
  border-radius:20px;
  padding:35px;
  text-align:center;
}

.question-number{
  font-size:24px;
  margin-bottom:10px;
  color:#555;
}

.english-text{
  font-size:48px;
  font-weight:bold;
  margin-bottom:15px;
  color:#111;
}

.thai-text{
  font-size:24px;
  color:#666;
}

.countdown{
  margin-top:25px;
  font-size:90px;
  color:#ff3b30;
  font-weight:bold;
}

.controls{
  margin-top:25px;
}

button{
  border:none;
  border-radius:15px;
  padding:18px 35px;
  font-size:20px;
  cursor:pointer;
}

.start-btn{
  background:#0077ff;
  color:white;
  transition:0.3s;
}

.start-btn:hover{
  background:#005fd1;
}

.result-box{
  margin-top:25px;
  background:#eaf4ff;
  border-radius:20px;
  padding:25px;
  text-align:center;
}

.score{
  font-size:65px;
  font-weight:bold;
  color:#0b57d0;
}

.status{
  margin-top:10px;
  font-size:34px;
  font-weight:bold;
}

.pass{
  color:green;
}

.fail{
  color:red;
}

.heard-text{
  margin-top:15px;
  font-size:20px;
}

.footer{
  margin-top:35px;
  text-align:center;
  color:#666;
  font-size:18px;
}

@media(max-width:700px){

  .english-text{
    font-size:32px;
  }

  .countdown{
    font-size:60px;
  }

  h1{
    font-size:30px;
  }

  .subtitle{
    font-size:18px;
  }

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🎤 AI Pronunciation Test Station</h1>

<div class="subtitle">
ระบบวัดการออกเสียงภาษาอังกฤษอัตโนมัติ
</div>

<div class="teacher-box">

<div class="teacher-title">
ผู้พัฒนาโครงการ
</div>

ครูวิทยากร วรรณา<br>
แผนกอิเล็กทรอนิกส์<br>
วิทยาลัยสารพัดช่างศรีสะเกษ

</div>

</div>

<div class="login-box">

<input
type="text"
id="studentName"
placeholder="กรอกชื่อผู้เข้าทดสอบ"
/>

</div>

<div class="top-bar">

<div class="stat">
คะแนนรวม:
<span id="totalScore">0</span>
</div>

<div class="stat">
PASS:
<span id="passCount">0</span>
</div>

<div class="stat">
FAIL:
<span id="failCount">0</span>
</div>

</div>

<div class="sentence-box">

<div class="question-number" id="questionNumber">
ข้อที่ 1 / 16
</div>

<div class="english-text" id="englishText">
Listen to me please
</div>

<div class="thai-text" id="thaiText">
กรุณาฟังครูครับ
</div>

<div class="countdown" id="countdown">
10
</div>

<div class="controls">

<button
class="start-btn"
onclick="startRecognition()"
>
🎤 เริ่มพูด
</button>

</div>

</div>

<div class="result-box">

<div class="score" id="score">
0%
</div>

<div class="status" id="status">
รอเริ่มทดสอบ
</div>

<div class="heard-text" id="heardText"></div>

</div>

<div class="footer">
AI Reward Learning Machine © 2026
</div>

</div>

<script>

// ======================================
// SETTINGS
// ======================================

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyb14pArEH-dG51DFuH6I5mCsxK9RZUTx_aRd7F2wseQH-o4347vo8h3QlOUFtoho5hYA/exec";

// ======================================
// QUESTIONS
// ======================================

const questions = [

{
english:"Listen to me please",
thai:"กรุณาฟังครูครับ"
},

{
english:"Turn on the power",
thai:"เปิดแหล่งจ่ายไฟ"
},

{
english:"Turn off the power",
thai:"ปิดแหล่งจ่ายไฟ"
},

{
english:"Plug it in",
thai:"เสียบปลั๊ก"
},

{
english:"Unplug it please",
thai:"ถอดปลั๊กด้วยครับ"
},

{
english:"Check the circuit first",
thai:"ตรวจเช็กวงจรก่อน"
},

{
english:"Please be careful",
thai:"ระมัดระวังด้วยครับ"
},

{
english:"Have you finished",
thai:"ทำงานเสร็จหรือยัง"
},

{
english:"Hurry up please",
thai:"เร่งมือหน่อยครับ"
},

{
english:"Times up stop working",
thai:"หมดเวลาแล้ว หยุดปฏิบัติงาน"
},

{
english:"Clean your desk and keep your equipment",
thai:"ทำความสะอาดโต๊ะและเก็บอุปกรณ์"
},

{
english:"Teacher may I go out",
thai:"ขออนุญาตออกนอกห้องครับ"
},

{
english:"Teacher may I come in",
thai:"ขออนุญาตเข้าห้องครับ"
},

{
english:"I have finished",
thai:"ผมทำเสร็จแล้วครับ"
},

{
english:"Can you help me please",
thai:"ครูช่วยผมหน่อยได้ไหมครับ"
},

{
english:"I dont understand this part",
thai:"ผมไม่เข้าใจตรงส่วนนี้ครับ"
}

];

// ======================================

let currentQuestion = 0;
let totalScore = 0;
let passCount = 0;
let failCount = 0;

let recognition;
let countdownInterval;
let timeLeft = 10;
let isRunning = false;

// ======================================

window.onload = () => {

if (!('webkitSpeechRecognition' in window)) {

alert("กรุณาเปิดด้วย Google Chrome");

return;

}

recognition = new webkitSpeechRecognition();

recognition.lang = 'en-US';

recognition.interimResults = false;

recognition.maxAlternatives = 1;

// ======================================

recognition.onresult = function(event){

if(!isRunning) return;

isRunning = false;

clearInterval(countdownInterval);

const speechResult =
event.results[0][0].transcript;

const target =
questions[currentQuestion].english;

const score =
similarity(target,speechResult);

document.getElementById("heardText").innerHTML =
"AI ได้ยิน: " + speechResult;

document.getElementById("score").innerHTML =
score + "%";

totalScore += score;

document.getElementById("totalScore").innerHTML =
totalScore;

// ======================================

if(score >= 80){

passCount++;

document.getElementById("passCount").innerHTML =
passCount;

document.getElementById("status").innerHTML =
"PASS ✅";

document.getElementById("status").className =
"status pass";

playPassSound();

}else{

failCount++;

document.getElementById("failCount").innerHTML =
failCount;

document.getElementById("status").innerHTML =
"FAIL ❌";

document.getElementById("status").className =
"status fail";

playFailSound();

}

setTimeout(() => {

nextQuestion();

},1500);

};

// ======================================

recognition.onerror = function(event){

console.log(event.error);

isRunning = false;

clearInterval(countdownInterval);

document.getElementById("status").innerHTML =
"ไมโครโฟนมีปัญหา ❌";

document.getElementById("status").className =
"status fail";

};

// ======================================

loadQuestion(currentQuestion);

};

// ======================================

function loadQuestion(index){

document.getElementById("questionNumber").innerHTML =
"ข้อที่ " + (index + 1) + " / 16";

document.getElementById("englishText").innerHTML =
questions[index].english;

document.getElementById("thaiText").innerHTML =
questions[index].thai;

document.getElementById("score").innerHTML =
"0%";

document.getElementById("status").innerHTML =
"รอเริ่มทดสอบ";

document.getElementById("status").className =
"status";

document.getElementById("heardText").innerHTML =
"";

document.getElementById("countdown").innerHTML =
"10";

}

// ======================================

function nextQuestion(){

currentQuestion++;

if(currentQuestion >= questions.length){

saveScoreToGoogleSheet();

alert(
"จบทดสอบแล้ว\nคะแนนรวม: " + totalScore
);

totalScore = 0;
passCount = 0;
failCount = 0;

document.getElementById("totalScore").innerHTML = 0;
document.getElementById("passCount").innerHTML = 0;
document.getElementById("failCount").innerHTML = 0;

currentQuestion = 0;

}

loadQuestion(currentQuestion);

}

// ======================================

function similarity(a,b){

a = a.toLowerCase().replace(/[^\w]/g,"");
b = b.toLowerCase().replace(/[^\w]/g,"");

let longer =
a.length > b.length ? a : b;

let shorter =
a.length > b.length ? b : a;

let same = 0;

for(let i=0;i<shorter.length;i++){

if(shorter[i] === longer[i]){

same++;

}

}

return Math.floor(
(same / longer.length) * 100
);

}

// ======================================

function startRecognition(){

const studentName =
document.getElementById("studentName").value;

if(studentName.trim() === ""){

alert("กรุณากรอกชื่อ");

return;

}

if(isRunning) return;

isRunning = true;

clearInterval(countdownInterval);

timeLeft = 10;

document.getElementById("countdown").innerHTML =
timeLeft;

document.getElementById("status").innerHTML =
"🎤 กำลังฟัง...";

document.getElementById("heardText").innerHTML =
"";

try {

recognition.start();

} catch(err){

console.log(err);

}

// ======================================

countdownInterval = setInterval(() => {

timeLeft--;

document.getElementById("countdown").innerHTML =
timeLeft;

if(timeLeft <= 0){

clearInterval(countdownInterval);

if(isRunning){

isRunning = false;

recognition.stop();

failCount++;

document.getElementById("failCount").innerHTML =
failCount;

document.getElementById("status").innerHTML =
"หมดเวลา ⏰";

document.getElementById("status").className =
"status fail";

document.getElementById("heardText").innerHTML =
"ไม่มีการพูด";

playFailSound();

setTimeout(() => {

nextQuestion();

},1500);

}

}

},1000);

}

// ======================================

function saveScoreToGoogleSheet(){

const studentName =
document.getElementById("studentName").value;

fetch(GOOGLE_SCRIPT_URL, {

method:"POST",

mode:"no-cors",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

name: studentName,
score: totalScore,
pass: passCount,
fail: failCount

})

})
.then(() => {

console.log("Saved To Google Sheet");

})
.catch(error => {

console.log("Google Sheet Error:", error);

});

}

// ======================================

function playPassSound(){

const audio = new Audio(
"https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
);

audio.play();

}

// ======================================

function playFailSound(){

const audio = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

audio.play();

}

</script>

</body>
</html>
